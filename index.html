    <style>
        :root {
            --primary-color: #2ecc71;
            --accent-color: #ff9f43;
            --dark-color: #1a1a1a;    
            --bg-color: #eef7ed;
            --white: #ffffff;
            --border-color: #d0e7cf;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--dark-color);
            padding-bottom: 60px;
        }

        header {
            background: linear-gradient(135deg, #1e3d2f, #121212);
            color: var(--white);
            text-align: center;
            padding: 25px 15px;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        header .logo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background-color: white;
            padding: 4px;
            margin-bottom: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            object-fit: contain;
        }

        header h1 { font-size: 24px; font-weight: 700; color: var(--accent-color); margin-bottom: 4px; }
        header p { font-size: 13px; opacity: 0.9; margin-bottom: 8px; color: #e0e0e0; }
        header .phones { font-size: 14px; font-weight: 700; color: #fff; background: rgba(255,255,255,0.15); display: inline-block; padding: 4px 12px; border-radius: 20px; direction: ltr; }

        .categories-nav {
            display: flex;
            justify-content: flex-start;
            gap: 8px;
            margin: 20px 0;
            overflow-x: auto;
            padding: 5px 15px;
            scrollbar-width: none;
        }
        .categories-nav::-webkit-scrollbar { display: none; }

        .category-btn {
            background-color: var(--white);
            color: var(--dark-color);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            transition: all 0.2s ease;
        }
        .category-btn.active, .category-btn:hover {
            background-color: #27ae60;
            color: var(--white);
            border-color: #27ae60;
            box-shadow: 0 4px 12px rgba(39, 174, 96, 0.2);
        }

        .container { padding: 0 15px; max-width: 1200px; margin: 0 auto; }
        
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
        }

        .product-card {
            background: var(--white);
            border-radius: 14px;
            padding: 14px;
            box-shadow: 0 4px 10px rgba(39, 174, 96, 0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid var(--border-color);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .product-card:hover { 
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(39, 174, 96, 0.12);
        }

        .product-name { font-size: 14px; font-weight: 600; margin-bottom: 8px; line-height: 1.4; color: #2c3e50; min-height: 40px; }
        .product-price { color: #e67e22; font-weight: 700; font-size: 15px; margin-bottom: 12px; display: block; }
        
        .add-btn {
            background-color: #f4fbf4;
            color: var(--dark-color);
            border: 1px solid #c8e6c9;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            width: 100%;
            transition: 0.2s;
        }
        .add-btn:hover { background-color: #27ae60; color: white; border-color: #27ae60; }

        .checkout-container {
            margin-top: 30px;
            background: var(--white);
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }
        .checkout-container h2 { font-size: 16px; margin-bottom: 15px; border-bottom: 2px solid var(--bg-color); padding-bottom: 8px; color: #2c3e50; }
        
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px dashed #eee;
            font-size: 14px;
        }
        .remove-item { color: #e74c3c; cursor: pointer; font-weight: bold; margin-right: 10px; }

        .total-box {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 18px;
            margin: 20px 0;
            color: #e67e22;
        }

        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; color: #555; }
        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
            background-color: #fafdfa;
        }
        .form-control:focus { border-color: #27ae60; background-color: #fff; }

        .submit-order-btn {
            width: 100%;
            background: #27ae60;
            color: var(--white);
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(39, 174, 96, 0.25);
        }
    </style>
</head>

        let cart = [];

        function renderMenu(categoryFilter = 'all') {
            const menuGrid = document.getElementById('menu-products');
            menuGrid.innerHTML = '';
            const filtered = categoryFilter === 'all' ? products : products.filter(p => p.category === categoryFilter);

            filtered.forEach(p => {
                menuGrid.innerHTML += `
                    <div class="product-card">
                        <span class="product-name">` + p.name + `</span>
                        <span class="product-price">` + p.price.toFixed(3) + ` د.ك</span>
                        <button class="add-btn" onclick="addToCart(` + p.id + `)">➕ إضافة للطلب</button>
                    </div>
                `;
            });
        }

        function filterCategory(category, element) {
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            renderMenu(category);
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            updateCart();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function updateCart() {
            const cartList = document.getElementById('cart-list');
            const cartTotal = document.getElementById('cart-total');
            
            if (cart.length === 0) {
                cartList.innerHTML = '<p style="color: #7f8c8d; text-align: center; padding: 15px;">السلة فارغة حالياً.. اضغط "إضافة" لتجهيز طلبك</p>';
                cartTotal.textContent = '0.000';
                return;
            }

            cartList.innerHTML = '';
            let total = 0;

            cart.forEach((item, index) => {
                total += item.price;
                cartList.innerHTML += `
                    <div class="cart-item">
                        <span>` + item.name + `</span>
                        <div>
                            <span style="font-weight:700; margin-left: 10px; color:#e67e22;">` + item.price.toFixed(3) + ` د.ك</span>
                            <span class="remove-item" onclick="removeFromCart(` + index + `)">❌</span>
                        </div>
                    </div>
                `;
            });

            cartTotal.textContent = total.toFixed(3);
        }

        function submitOrder() {
            const name = document.getElementById('cust-name').value.trim();
            const phone = document.getElementById('cust-phone').value.trim();

            if (!name || !phone) {
                alert('فضلاً، أدخل الاسم ورقم الهاتف لتأكيد الطلب.');
                return;
            }
            if (cart.length === 0) {
                alert('سلتك فارغة! اختر الوجبات أولاً قبل الإرسال.');
                return;
            }

            alert('مرحباً ' + name + '! تم استلام طلبك لـ مطعم فتوش الخالدية بنجاح بنظام الكاش.');
        }

        renderMenu();
    </script>
</body>
